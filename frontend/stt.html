<!DOCTYPE html>
<html>
<head>
    <title>Speech to Text</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="navbar">
        <div class="logo">
            <span class="logo-text">Sign<span class="logo-vaarta">Vaarta</span></span>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="isl.html">ISL to Speech</a>
            <a href="learning.html">ISL Learning</a>
            <a href="stt.html" class="active">Speech to Text</a>
        </div>
    </div>

    <div class="page-content-stt">
        <div class="stt-header">
            <h1>Speech to Text</h1>
            <p class="stt-subtitle">Convert spoken words into text.</p>
        </div>

        <div class="stt-container">
            <button class="mic-button" id="micButton">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                    <line x1="12" y1="19" x2="12" y2="23"></line>
                    <line x1="8" y1="23" x2="16" y2="23"></line>
                </svg>
            </button>
            <p class="mic-instruction">Tap the microphone to start</p>

            <div class="transcript-card">
                <div class="transcript-header">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <span>Transcript</span>
                </div>
                <div class="transcript-content">
                    <p id="transcriptText" class="transcript-placeholder">Your speech will appear here...</p>
                </div>
            </div>
        </div>

        <footer class="stt-footer">
            <p>&copy; 2026 <span class="footer-brand">Sign<span class="footer-vaarta">Vaarta</span></span> - AI-powered Indian Sign Language Communication</p>
        </footer>
    </div>

    <script>
        const micButton = document.getElementById('micButton');
        const transcriptText = document.getElementById('transcriptText');
        let isRecording = false;
        let recognition;

        // Check if browser supports speech recognition
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            recognition.onresult = (event) => {
                let interimTranscript = '';
                let finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalTranscript += transcript + ' ';
                    } else {
                        interimTranscript += transcript;
                    }
                }

                if (finalTranscript || interimTranscript) {
                    transcriptText.textContent = (transcriptText.textContent === 'Your speech will appear here...' ? '' : transcriptText.textContent) + finalTranscript + interimTranscript;
                    transcriptText.classList.remove('transcript-placeholder');
                }
            };

            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                stopRecording();
            };

            recognition.onend = () => {
                if (isRecording) {
                    recognition.start();
                }
            };
        }

        micButton.addEventListener('click', () => {
            if (!recognition) {
                alert('Speech recognition is not supported in your browser. Please use Chrome or Edge.');
                return;
            }

            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        });

        function startRecording() {
            isRecording = true;
            micButton.classList.add('recording');
            recognition.start();
        }

        function stopRecording() {
            isRecording = false;
            micButton.classList.remove('recording');
            recognition.stop();
        }
    </script>
</body>
</html>
