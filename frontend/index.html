<!DOCTYPE html>
<html>
<head>
    <title>ISL Live Demo</title>
</head>
<body>
    <h2>ISL Live Prediction</h2>

    <video id="video" width="400" height="300" autoplay></video>
    <br><br>

    <h3>Prediction:</h3>
    <p id="result">Waiting...</p>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
    const video = document.getElementById("video");
    const result = document.getElementById("result");

    let isPredicting = false;
    let frameBuffer = [];

    /* ----------- CAMERA ACCESS ----------- */

    navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => {
            video.srcObject = stream;
        })
        .catch(err => {
            result.innerText = "Camera access denied";
            console.error(err);
        });

    /* ----------- MEDIA PIPE INITIALIZATION ----------- */

    const hands = new Hands({
        locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }
    });

    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.7
    });

    hands.onResults(results => {
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const landmarks = results.multiHandLandmarks[0];

            let frame = [];
            landmarks.forEach(lm => {
                frame.push(lm.x, lm.y, lm.z);
            });

            // If one hand detected (63 values), pad to 126
            if (frame.length === 63) {
                frame = frame.concat(new Array(63).fill(0));
            }

            if (frame.length === 126) {
                frameBuffer.push(frame);
            }

            // Keep sliding window of 30 frames
            if (frameBuffer.length > 30) {
                frameBuffer.shift();
            }

            // Trigger prediction
            if (frameBuffer.length === 30) {
                sendToAPI();
            }
        }
    });

    /* ----------- CAMERA START ----------- */

    const camera = new Camera(video, {
        onFrame: async () => {
            await hands.send({ image: video });
        },
        width: 400,
        height: 300
    });

    camera.start();

    /* ----------- BACKEND CALL ----------- */

    async function sendToAPI() {

        if (isPredicting) return;

        isPredicting = true;

        // Copy buffer to avoid mutation during async call
        const bufferCopy = [...frameBuffer];

        try {
            const response = await fetch("https://api.signvaarta.com/predict", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ data: bufferCopy })
            });

            if (!response.ok) {
                throw new Error("Server error");
            }

            const data = await response.json();

            if (data.prediction) {
                result.innerText = data.prediction;
            } else {
                result.innerText = "No prediction";
            }

        } catch (error) {
            console.error(error);
            result.innerText = "Prediction error";
        }

        // Small delay to avoid spamming backend
        setTimeout(() => {
            isPredicting = false;
        }, 200);
    }
    </script>
</body> 
</html>
