<!DOCTYPE html>
<html>
<head>
    <title>ISL Live Demo</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="navbar">
        <div class="logo">
            <span class="logo-text">Sign<span class="logo-vaarta">Vaarta</span></span>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="isl.html" class="active">ISL to Speech</a>
            <a href="learning.html">ISL Learning</a>
            <a href="stt.html">Speech to Text</a>
        </div>
    </div>
    <div class="page-content-isl">
        <div class="isl-header">
            <h1>ISL Live Prediction</h1>
            <p class="isl-subtitle">Real-time Indian Sign Language recognition</p>
        </div>

        <div class="isl-demo-container">
            <!-- Camera Section -->
            <div class="camera-panel">
                <div class="panel-header">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                    <span>Camera Feed</span>
                    <span class="live-badge">
                        <span class="live-dot"></span>
                        Live
                    </span>
                </div>
                <div class="camera-container">
                    <video id="video" autoplay></video>
                    <canvas id="canvas"></canvas>
                    <div class="camera-placeholder">
                        <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                        <p>Camera feed will appear here</p>
                        <span>Connect your webcam to start</span>
                    </div>
                </div>
            </div>

            <!-- Results Section -->
            <div class="results-panel">
                <!-- Prediction Card -->
                <div class="result-card">
                    <div class="card-header">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"></path><path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v2"></path><path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v8"></path><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"></path></svg>
                        <span>Prediction</span>
                    </div>
                    <div class="card-content">
                        <div id="predictionText" class="prediction-value">-</div>
                    </div>
                </div>

                <!-- Confidence Card -->
                <div class="result-card">
                    <div class="card-header">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                        <span>Confidence</span>
                        <span id="confidenceValue" class="confidence-percent">0%</span>
                    </div>
                    <div class="card-content">
                        <div class="confidence-container">
                            <div id="confidenceBar"></div>
                        </div>
                    </div>
                </div>

                <!-- Gloss Card -->
                <div class="result-card">
                    <div class="card-header">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                        <span>Gloss</span>
                    </div>
                    <div class="card-content">
                        <div id="glossText" class="gloss-value">-</div>
                    </div>
                </div>

                <!-- AI Generated Sentence Card -->
                <div class="result-card">
                    <div class="card-header">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path><line x1="9" y1="10" x2="15" y2="10"></line><line x1="12" y1="7" x2="12" y2="13"></line></svg>
                        <span>AI Generated Sentence</span>
                    </div>
                    <div class="card-content">
                        <div id="sentence" class="sentence-value">"-"</div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="action-buttons">
                    <button class="btn-generate" onclick="generateSentence()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
                        Generate
                    </button>
                    <button class="btn-speak" onclick="speakSentence()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                        Speak
                    </button>
                    <button class="btn-clear" onclick="clearText()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        Clear
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

    <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const predictionText = document.getElementById("predictionText");
    const confidenceBar = document.getElementById("confidenceBar");
    const confidenceValue = document.getElementById("confidenceValue");
    const glossText = document.getElementById("glossText");

    let isPredicting = false;
    let frameBuffer = [];

    let rawPredictions = [];
    let glossTokens = [];

    let lastPrediction = "";
    let repeatCount = 0;

    let currentLetters = "";
    let finalGloss = [];
    let sentenceGenerated = false;

    let lastSignTime = Date.now();
    const PAUSE_THRESHOLD = 4000; // 4 seconds

    const STABILITY_THRESHOLD = 2;

    let currentWord = "";
    let lastLetter = "";
    let lastAppendTime = 0;
    const LETTER_COOLDOWN = 800; // milliseconds
    const CONFIDENCE_THRESHOLD = 0.80;

    let predictionHistory = [];
    const STABILITY_COUNT = 3;

    const sentenceOutput = document.getElementById("sentence");
    let formattedSentence = "";

    /* ----------- CAMERA ACCESS ----------- */

    navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => {
            video.srcObject = stream;
            // Hide placeholder when camera starts
            const placeholder = document.querySelector('.camera-placeholder');
            if (placeholder) {
                placeholder.style.display = 'none';
            }
        })
        .catch(err => {
            predictionText.innerText = "Camera access denied";
            console.error(err);
        });

    /* ----------- MEDIA PIPE INITIALIZATION ----------- */

    const hands = new Hands({
        locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }
    });

    hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    hands.onResults(results => {
        // Clear canvas and draw hand landmarks
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Draw hand landmarks if detected
        if (results.multiHandLandmarks) {
            for (const landmarks of results.multiHandLandmarks) {
                // Draw connections
                drawConnectors(ctx, landmarks, HAND_CONNECTIONS, {color: '#a855f7', lineWidth: 2});
                // Draw landmarks
                drawLandmarks(ctx, landmarks, {color: '#d946ef', lineWidth: 1, radius: 3});
            }
        }
        
        ctx.restore();
        
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {

            let frame = [];

            // Append landmarks in the SAME order MediaPipe returns (like training)
            results.multiHandLandmarks.forEach(hand => {
                hand.forEach(lm => {
                    frame.push(lm.x, lm.y, lm.z);
                });
            });

            // If only 1 hand detected → pad 63 zeros (match training)
            if (frame.length === 63) {
                frame = frame.concat(new Array(63).fill(0));
            }

            if (frame.length === 126) {
                frameBuffer.push(frame);
            }

            // Keep sliding window of 30 frames
            if (frameBuffer.length > 30) {
                frameBuffer.shift();
            }

            // Trigger prediction
            if (frameBuffer.length === 30) {
                sendToAPI();
            }
        }
    });
    /* ----------- CAMERA START ----------- */

    const camera = new Camera(video, {
        onFrame: async () => {
            await hands.send({ image: video });
        },
        width: 640,
        height: 480
    });

    // Set canvas size to match video
    video.addEventListener('loadedmetadata', () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
    });

    camera.start();

    /* ----------- BACKEND CALL ----------- */

    async function sendToAPI() {

        if (isPredicting) return;

        isPredicting = true;

        // Copy buffer to avoid mutation during async call
        const bufferCopy = [...frameBuffer];

        try {
            const response = await fetch("https://api.signvaarta.com/predict", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ data: bufferCopy })
            });

            if (!response.ok) {
                throw new Error("Server error");
            }

            const data = await response.json();

            if (data.prediction && data.confidence >= CONFIDENCE_THRESHOLD) {

                const prediction = data.prediction;

                rawPredictions.push(prediction);

                if (prediction === lastPrediction) {
                    repeatCount++;
                } else {
                    repeatCount = 1;
                }

                lastPrediction = prediction;

                if (repeatCount === STABILITY_THRESHOLD) {

                    if (glossTokens.length === 0 || glossTokens[glossTokens.length - 1] !== prediction) {

                        glossTokens.push(prediction);
                        lastSignTime = Date.now();
                        sentenceGenerated = false;

                        // ---- Word Builder (only when token is stable) ----

                        if (prediction.length === 1) {

                            currentLetters += prediction;

                        } else {

                            if (currentLetters.length > 0) {
                                finalGloss.push(currentLetters);
                                currentLetters = "";
                            }

                            finalGloss.push(prediction);
                        }

                    }
                }

                predictionText.innerText = prediction;

                const confidencePercent = Math.round(data.confidence * 100);

                confidenceBar.style.width = confidencePercent + "%";
                confidenceValue.innerText = confidencePercent + "%";

                glossText.innerText =
                    [...finalGloss, ...(currentLetters ? [currentLetters] : [])].join(" ");

            } else {

                // reset stability when prediction confidence is low
                repeatCount = 0;

            }

        } catch (error) {
            console.error(error);
            predictionText.innerText = "Prediction error";
        }

        // Small delay to avoid spamming backend
        setTimeout(() => {
            isPredicting = false;
        }, 200);
    }

    async function generateSentence() {

        const glossText = [...finalGloss, currentLetters].join(" ");
        if (!glossText) return;

        try {
            const response = await fetch("https://api.signvaarta.com/format", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text: glossText })
            });

            const data = await response.json();

            if (data.sentence) {

                sentenceOutput.innerText = data.sentence;
                sentenceGenerated = true;

                // small delay before speaking so user can read sentence
                setTimeout(() => {
                    speakSentence(data.sentence);
                }, 1200);

            } else {
                sentenceOutput.innerText = "Formatting error";
            }

        } catch (error) {
            console.error(error);
            sentenceOutput.innerText = "Formatting error";
        }
    }

    async function speakSentence(text = sentenceOutput.innerText) {

        if (!sentenceOutput.innerText || sentenceOutput.innerText === "Waiting...") return;

        try {
            const response = await fetch("https://api.signvaarta.com/speak", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text: text })
            });

            const data = await response.json();

            if (data.audio) {
                const audio = new Audio("data:audio/mp3;base64," + data.audio);
                audio.play();
            }

        } catch (error) {
            console.error(error);
        }
    }

    function clearText() {

        rawPredictions = [];
        glossTokens = [];

        repeatCount = 0;
        lastPrediction = "";

        currentLetters = "";
        finalGloss = [];

        frameBuffer = [];

        lastSignTime = Date.now();

        predictionText.innerText = "Waiting...";
        confidenceBar.style.width = "0%";
        confidenceValue.innerText = "0%";
        glossText.innerText = "Waiting...";
        sentenceOutput.innerText = "Waiting...";
    }

    setInterval(() => {

        const now = Date.now();
        const glossText = [...finalGloss, currentLetters].join(" ");

        if (!sentenceGenerated && glossText.length > 0 && (now - lastSignTime) > PAUSE_THRESHOLD)  {

            generateSentence();

            // prevent repeated triggering
            lastSignTime = Date.now();

        }

    }, 1000);
            
    </script>
</div>
</body> 
</html>
